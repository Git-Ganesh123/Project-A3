<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - Jo Mercer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="payment-body">

  <div class="payment-label">Payment</div>
  <div class="payment-image">
    <img src="images/payment-model.jpg" alt="">
  </div>

  <div class="payment-form">
    <a href="cart.html" class="payment-return">Return to Shopping</a>
    <h2>Billing Details</h2>
  
    <label>First & Last Name</label>
    <input type="text" placeholder="i.e. Filler name">
  
    <label>Email Address</label>
    <input type="email" placeholder="i.e. name@email.com">
  
    <label>Country</label>
    <select>
      <option>USA</option>
      <option>Australia</option>
      <option>United Kingdom</option>
    </select>
  
    <label>Credit Cards</label>
    <input type="text">
  
    <label>Expire Date</label>
    <input type="text" placeholder="Month/Year">
  
    <label>Security Code</label>
    <input type="text" placeholder="PIN">
  
    <p>By clicking this button you agree to the end-user agreement.</p>
  
    <button>Confirm Payment</button>
  </div>



  <script src="script.js"></script>
</body>
</html>
