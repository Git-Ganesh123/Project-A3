<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jo Mercer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <button id="menuBtn">
      <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
        <line y1="1" x2="22" y2="1" stroke="black" stroke-width="2"/>
        <line y1="8" x2="22" y2="8" stroke="black" stroke-width="2"/>
        <line y1="15" x2="22" y2="15" stroke="black" stroke-width="2"/>
      </svg>
    </button>
    <h1>
        <a href="index.html">
            <img src="images/bow.png" alt="" class="bow-icon">
            JO MERCER
            <img src="images/bow.png" alt="" class="bow-icon flipped">
        </a>
      </h1>
    <a href="cart.html" class="cart-link">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="7" width="18" height="14" rx="1"/>
        <path d="M8 7V5a4 4 0 0 1 8 0v2"/>
      </svg>
    </a>
  </header>

  <nav id="fullMenu" class="full-menu">
    <div class="menu-inner">
      <div class="menu-search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="" class="search-input">
      </div>
      <div class="menu-categories">
        <a href="boots.html" class="menu-cat-item">
          <div class="menu-cat-img"><img src="images/cat-boots.jpeg" alt="Boots"></div>
          <span class="menu-cat-label">BOOTS</span>
        </a>
        <a href="heels.html" class="menu-cat-item">
          <div class="menu-cat-img"><img src="images/cat-heels.jpeg" alt="Heels"></div>
          <span class="menu-cat-label">HEELS</span>
        </a>
        <a href="bags.html" class="menu-cat-item">
          <div class="menu-cat-img"><img src="images/cat-bags.jpeg" alt="Bags"></div>
          <span class="menu-cat-label">BAGS</span>
        </a>
      </div>
      <button id="closeBtn" class="menu-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
    </div>
  </nav>

  <section class="cart-page">
    <h1 class="page-title">YOUR CART</h1>

    <div class="cart-header-row">
      <span class="cart-col-label">PRODUCT</span>
      <span class="cart-col-label">AMOUNT</span>
      <span class="cart-col-label">PRICE</span>
      <span class="cart-col-label"></span>
    </div>

    <div id="cartItems"></div>

    <div class="cart-total-row">
      <span class="cart-total-label">TOTAL</span>
      <span class="cart-total-price" id="cartTotal">$0</span>
    </div>

    <div class="cart-actions">
      <a href="index.html" class="cart-continue">Continue Shopping</a>
      <a href="payment.html" class="cart-checkout">Proceed to Payment</a>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
